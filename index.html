<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MYA Gaming</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
    body { font-family: 'Poppins', sans-serif; font-size: 15px; }
    .header-name-box { background: #111; border: 2px solid #222; border-radius: 16px; padding: 14px 0; }
    .slide-menu { transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); }
    .slide-menu.open { transform: translateX(0); }
    .torch-toggle { width: 62px; height: 32px; background: #222; border-radius: 9999px; position: relative; cursor: pointer; }
    .dark .torch-toggle { background: #444; }
    .torch-toggle .knob { width: 26px; height: 26px; background: #fff; border-radius: 50%; position: absolute; top: 3px; left: 4px; transition: all 0.4s; display: flex; align-items: center; justify-content: center; }
    .game-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .game-card:hover { transform: scale(1.04); }
    .show-btn { color: #3b82f6; font-size: 14px; font-weight: 500; }
  </style>
</head>
<body class="bg-black text-white min-h-screen">

  <!-- HEADER -->
  <header class="bg-[#111] shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <button id="profileBtn" class="w-11 h-11 rounded-2xl overflow-hidden border-2 border-white flex items-center justify-center text-3xl">👤</button>
      <div id="themeToggle" class="torch-toggle">
        <div class="knob" id="toggleKnob"><i id="themeIcon" class="fas fa-torch text-black"></i></div>
      </div>
    </div>
    <div class="max-w-7xl mx-auto px-6 pb-6">
      <div class="header-name-box text-center">
        <h1 class="text-3xl font-semibold tracking-tight">MYA Gaming</h1>
      </div>
    </div>
  </header>

  <div id="mainContent" class="max-w-7xl mx-auto px-6 py-8"></div>

  <!-- SLIDING MENU -->
  <div id="slideMenu" class="slide-menu fixed top-0 right-0 h-full w-80 bg-[#111] shadow-2xl z-[100] p-6 overflow-y-auto">
    <button id="closeMenu" class="absolute top-6 right-6 text-3xl text-gray-400">✕</button>
    <div id="menuContent" class="space-y-8 mt-8"></div>
  </div>

  <!-- Floating WhatsApp -->
  <a id="whatsappFloat" href="#" target="_blank" class="fixed bottom-6 right-6 bg-green-500 w-14 h-14 rounded-3xl flex items-center justify-center text-4xl shadow-2xl z-50">
    <i class="fab fa-whatsapp"></i>
  </a>

  <script src="script.js"></script>
</body>
</html>
