<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAY GAMING | Premium Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #020617;
            --bg-card: #0f172a;
            --primary: #38bdf8;
            --secondary: #818cf8;
            --accent: #f472b6;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; line-height: 1.6; }
        .hidden { display: none !important; }

        /* --- UI HELPERS --- */
        .btn-premium {
            width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .btn-premium:active { transform: scale(0.95); }

        input, textarea {
            width: 100%; padding: 14px; background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 12px; color: #fff; font-size: 16px; margin-bottom: 15px; outline: none;
        }
        input:focus { border-color: var(--primary); background: rgba(0,0,0,0.3); }

        .pass-wrapper { position: relative; width: 100%; }
        .toggle-password { position: absolute; right: 15px; top: 15px; color: var(--text-dim); cursor: pointer; z-index: 10; font-size: 18px; }

        /* --- AUTH SECTION --- */
        .auth-screen { min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; background: radial-gradient(circle at top, #1e293b, #020617); }
        .auth-card { background: var(--bg-card); padding: 35px 25px; border-radius: 30px; width: 100%; max-width: 400px; border: 1px solid var(--glass-border); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .auth-card h2 { font-family: 'Orbitron'; text-align: center; color: var(--primary); margin-bottom: 30px; font-size: 1.8rem; }

        /* --- MOBILE DASHBOARD LAYOUT --- */
        header {
            height: 70px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 900; border-bottom: 1px solid var(--glass-border);
        }

        .sidebar {
            position: fixed; left: -100%; top: 0; width: 85%; height: 100vh;
            background: var(--bg-card); z-index: 2000; padding: 30px 20px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column;
        }
        .sidebar.open { left: 0; }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1500; display: none; }
        .sidebar-overlay.active { display: block; }

        .nav-link {
            padding: 16px; margin-bottom: 10px; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; gap: 15px; color: var(--text-dim); font-weight: 500;
        }
        .nav-link.active { background: var(--primary); color: white; }
        .nav-link i { font-size: 20px; width: 25px; }

        /* --- CONTENT AREAS --- */
        .main-content { padding: 20px; padding-bottom: 100px; }
        .view-title { font-family: 'Orbitron'; font-size: 1.5rem; margin-bottom: 25px; color: var(--primary); border-left: 4px solid var(--primary); padding-left: 15px; }

        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        @media (min-width: 768px) { .game-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); } }

        .card { background: var(--bg-card); border-radius: 20px; overflow: hidden; border: 1px solid var(--glass-border); }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .card-body { padding: 15px; }
        .card-body h3 { font-size: 1rem; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-btn-group { display: flex; gap: 8px; margin-top: 12px; }
        .card-btn { flex: 1; padding: 10px; border-radius: 8px; text-align: center; font-size: 12px; font-weight: 700; text-decoration: none; }

        /* --- ADMIN BOXES --- */
        .admin-section { background: var(--glass); padding: 20px; border-radius: 20px; border: 1px solid var(--glass-border); margin-bottom: 25px; }
        .admin-section h3 { margin-bottom: 15px; font-size: 1.1rem; color: var(--secondary); display: flex; align-items: center; gap: 10px; }
        
        .manage-game-item { display: flex; align-items: center; gap: 15px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 12px; margin-bottom: 10px; }
        .manage-game-item img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        .manage-actions { margin-left: auto; display: flex; gap: 10px; }
        .btn-icon { width: 35px; height: 35px; border-radius: 8px; display: flex; justify-content: center; align-items: center; border: none; cursor: pointer; color: white; }

        /* WhatsApp Button */
        .wa-float { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: #25d366; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 1000; }
    </style>
</head>
<body>

    <div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

    <section id="view-auth" class="auth-screen">
        <div class="auth-card" id="box-login">
            <h2>LOGIN</h2>
            <input type="email" id="log-email" placeholder="Email Address">
            <div class="pass-wrapper">
                <input type="password" id="log-pass" placeholder="Password">
                <i class="fa-solid fa-eye toggle-password" onclick="togglePassView('log-pass')"></i>
            </div>
            <button class="btn-premium" onclick="handleLogin()">Sign In</button>
            <p style="text-align:center; margin-top:20px; font-size:14px; color:var(--text-dim)">Don't have an account? <span style="color:var(--primary); cursor:pointer" onclick="switchAuth('reg')">Register</span></p>
        </div>

        <div class="auth-card hidden" id="box-reg">
            <h2>REGISTER</h2>
            <input type="text" id="reg-name" placeholder="Full Name">
            <input type="text" id="reg-user" placeholder="Username">
            <input type="email" id="reg-email" placeholder="Email">
            <div class="pass-wrapper">
                <input type="password" id="reg-pass" placeholder="Password">
                <i class="fa-solid fa-eye toggle-password" onclick="togglePassView('reg-pass')"></i>
            </div>
            <div class="pass-wrapper">
                <input type="password" id="reg-conf-pass" placeholder="Confirm Password">
                <i class="fa-solid fa-eye toggle-password" onclick="togglePassView('reg-conf-pass')"></i>
            </div>
            <button class="btn-premium" onclick="handleRegister()">Create Account</button>
            <p style="text-align:center; margin-top:20px; font-size:14px; color:var(--text-dim)">Already a member? <span style="color:var(--primary); cursor:pointer" onclick="switchAuth('log')">Login</span></p>
        </div>
    </section>

    <div id="view-app" class="hidden">
        <header>
            <div style="display:flex; align-items:center; gap:15px;">
                <i class="fa-solid fa-bars-staggered" style="font-size:22px; cursor:pointer" onclick="openSidebar()"></i>
                <h1 style="font-family:'Orbitron'; font-size:1.2rem; color:var(--primary); letter-spacing:1px;">MAY GAMING</h1>
            </div>
            <div id="admin-indicator" class="hidden" style="background:var(--danger); color:white; font-size:10px; padding:3px 8px; border-radius:5px; font-weight:800;">ADMIN</div>
        </header>

        <nav class="sidebar" id="sidebar">
            <div style="text-align:center; margin-bottom:30px; padding-bottom:20px; border-bottom:1px solid var(--glass-border);">
                <div style="width:70px; height:70px; background:linear-gradient(45deg, var(--primary), var(--secondary)); border-radius:50%; margin:0 auto 10px; display:flex; justify-content:center; align-items:center; font-size:30px; border:2px solid var(--primary);">👤</div>
                <h3 id="display-user-name" style="font-size:1.1rem;">Gamer</h3>
                <p id="display-user-handle" style="font-size:0.8rem; color:var(--primary);">@username</p>
            </div>

            <div class="nav-link active" onclick="showTab('dashboard')"><i class="fa-solid fa-house"></i> Dashboard</div>
            <div class="nav-link" onclick="showTab('store')"><i class="fa-solid fa-gamepad"></i> Game Store</div>
            <div class="nav-link" onclick="showTab('settings')"><i class="fa-solid fa-user-gear"></i> Settings</div>
            <div class="nav-link hidden" id="nav-admin" onclick="showTab('admin')"><i class="fa-solid fa-shield-halved"></i> Control Panel</div>
            
            <div class="nav-link" onclick="handleLogout()" style="margin-top:auto; color:var(--danger); border-top:1px solid var(--glass-border); padding-top:20px;">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </div>
        </nav>

        <main class="main-content">
            <section id="tab-dashboard">
                <h2 class="view-title">New Games</h2>
                <div id="feed-container" class="game-grid"></div>
            </section>

            <section id="tab-store" class="hidden">
                <h2 class="view-title">Game Store</h2>
                <div style="margin-bottom:20px;">
                    <input type="text" id="store-search" onkeyup="filterStore()" placeholder="Search games..." style="margin-bottom:0;">
                </div>
                <div id="store-container" class="game-grid"></div>
            </section>

            <section id="tab-settings" class="hidden">
                <h2 class="view-title">Settings</h2>
                <div class="admin-section">
                    <h3><i class="fa-solid fa-user-pen"></i> Edit Profile</h3>
                    <label style="font-size:12px; color:var(--text-dim)">Display Name</label>
                    <input type="text" id="set-name" placeholder="Full Name">
                    
                    <label style="font-size:12px; color:var(--text-dim)">Change Password</label>
                    <div class="pass-wrapper">
                        <input type="password" id="set-pass" placeholder="New Password">
                        <i class="fa-solid fa-eye toggle-password" onclick="togglePassView('set-pass')"></i>
                    </div>
                    
                    <label style="font-size:12px; color:var(--text-dim)">Confirm New Password</label>
                    <div class="pass-wrapper">
                        <input type="password" id="set-conf-pass" placeholder="Confirm New Password">
                        <i class="fa-solid fa-eye toggle-password" onclick="togglePassView('set-conf-pass')"></i>
                    </div>
                    
                    <button class="btn-premium" onclick="updateProfile()">Update Account</button>
                </div>
            </section>

            <section id="tab-admin" class="hidden">
                <h2 class="view-title">Control Panel</h2>

                <div class="admin-section">
                    <h3><i class="fa-solid fa-link"></i> Social API Settings</h3>
                    <div style="display:grid; grid-template-columns:1fr; gap:10px;">
                        <div>
                            <label style="font-size:11px; color:var(--primary)">WhatsApp Number</label>
                            <input type="text" id="adm-wa-num" placeholder="e.g. 923001234567">
                        </div>
                        <div>
                            <label style="font-size:11px; color:var(--primary)">WhatsApp Channel Link</label>
                            <input type="text" id="adm-wa-chan" placeholder="Channel URL">
                        </div>
                        <div>
                            <label style="font-size:11px; color:var(--primary)">TikTok Account Link</label>
                            <input type="text" id="adm-tiktok" placeholder="TikTok URL">
                        </div>
                        <div>
                            <label style="font-size:11px; color:var(--primary)">YouTube Channel Link</label>
                            <input type="text" id="adm-yt" placeholder="YouTube URL">
                        </div>
                    </div>
                    <button class="btn-premium" onclick="saveSocials()">Save Social Links</button>
                </div>

                <div class="admin-section">
                    <h3><i class="fa-solid fa-plus"></i> Add New Game</h3>
                    <input type="text" id="g-icon" placeholder="Icon URL">
                    <input type="text" id="g-title" placeholder="Game Title">
                    <input type="text" id="g-video" placeholder="Trailer URL">
                    <input type="text" id="g-dl" placeholder="Download URL">
                    <textarea id="g-desc" placeholder="Brief description..."></textarea>
                    <button class="btn-premium" onclick="pushGame()">Publish Game</button>
                </div>

                <div class="admin-section">
                    <h3><i class="fa-solid fa-list-check"></i> Manage Games</h3>
                    <div id="admin-game-list">
                        </div>
                </div>

                <div class="admin-section">
                    <h3><i class="fa-solid fa-users"></i> User Access</h3>
                    <div id="admin-user-list"></div>
                </div>
            </section>
        </main>
    </div>

    <a id="wa-link" href="#" target="_blank" class="wa-float hidden">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-auth.js";
        import { getDatabase, ref, set, get, update, onValue, remove } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2zK-JYv2-Eg7HoxFB9RlmXbQzg6CwkzU",
            authDomain: "may-gaming.firebaseapp.com",
            databaseURL: "https://may-gaming-default-rtdb.firebaseio.com",
            projectId: "may-gaming",
            storageBucket: "may-gaming.firebasestorage.app",
            messagingSenderId: "1072630613356",
            appId: "1:1072630613356:web:fa8cce006382186bf01f49"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const OWNER_EMAIL = "saabj5614@gmail.com";

        // --- AUTH FUNCTIONS ---
        window.handleLogin = () => {
            const e = document.getElementById('log-email').value;
            const p = document.getElementById('log-pass').value;
            if(!e || !p) return alert("Fill all fields");
            signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
        };

        window.handleRegister = () => {
            const name = document.getElementById('reg-name').value;
            const user = document.getElementById('reg-user').value.toLowerCase();
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const conf = document.getElementById('reg-conf-pass').value;

            if(pass !== conf) return alert("Passwords do not match!");
            if(!name || !user || !email || !pass) return alert("Fill all fields");

            createUserWithEmailAndPassword(auth, email, pass).then(res => {
                set(ref(db, 'users/' + res.user.uid), {
                    name, username: user, email, status: 'active', role: 'user'
                });
            }).catch(err => alert(err.message));
        };

        onAuthStateChanged(auth, user => {
            if(user) {
                get(ref(db, 'users/' + user.uid)).then(snap => {
                    const data = snap.val();
                    if(data && data.status === 'blocked') {
                        alert("Account Blocked!");
                        signOut(auth);
                        return;
                    }
                    document.getElementById('view-auth').classList.add('hidden');
                    document.getElementById('view-app').classList.remove('hidden');
                    
                    document.getElementById('display-user-name').innerText = data.name;
                    document.getElementById('display-user-handle').innerText = "@" + data.username;
                    document.getElementById('set-name').value = data.name;

                    if(user.email === OWNER_EMAIL) {
                        document.getElementById('nav-admin').classList.remove('hidden');
                        document.getElementById('admin-indicator').classList.remove('hidden');
                    }
                    loadContent();
                });
            } else {
                document.getElementById('view-auth').classList.remove('hidden');
                document.getElementById('view-app').classList.add('hidden');
            }
        });

        // --- DATABASE FUNCTIONS ---
        function loadContent() {
            // Load Games
            onValue(ref(db, 'games'), snap => {
                const games = snap.val();
                let feed = '', store = '', adminList = '', count = 0;
                for(let id in games) {
                    const g = games[id];
                    count++;
                    const cardHtml = `
                        <div class="card">
                            <img src="${g.icon}">
                            <div class="card-body">
                                <h3>${g.title}</h3>
                                <div class="card-btn-group">
                                    <a href="${g.dl}" class="card-btn" style="background:var(--primary); color:black;">INSTALL</a>
                                    <a href="${g.video}" class="card-btn" style="border:1px solid var(--glass-border); color:white;">VIDEO</a>
                                </div>
                            </div>
                        </div>`;
                    store += cardHtml;
                    feed += cardHtml;
                    
                    adminList += `
                        <div class="manage-game-item">
                            <img src="${g.icon}">
                            <span>${g.title}</span>
                            <div class="manage-actions">
                                <button class="btn-icon" style="background:var(--primary)" onclick="editGame('${id}')"><i class="fa-solid fa-pen"></i></button>
                                <button class="btn-icon" style="background:var(--danger)" onclick="deleteGame('${id}')"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>`;
                }
                document.getElementById('feed-container').innerHTML = feed;
                document.getElementById('store-container').innerHTML = store;
                document.getElementById('admin-game-list').innerHTML = adminList;
            });

            // Load Socials
            onValue(ref(db, 'settings/socials'), snap => {
                const s = snap.val();
                if(s) {
                    document.getElementById('wa-link').href = `https://wa.me/${s.whatsapp}`;
                    document.getElementById('wa-link').classList.remove('hidden');
                    // Fill Admin Inputs
                    document.getElementById('adm-wa-num').value = s.whatsapp || '';
                    document.getElementById('adm-wa-chan').value = s.wa_channel || '';
                    document.getElementById('adm-tiktok').value = s.tiktok || '';
                    document.getElementById('adm-yt').value = s.youtube || '';
                }
            });

            // Load Users for Admin
            if(auth.currentUser.email === OWNER_EMAIL) {
                onValue(ref(db, 'users'), snap => {
                    const users = snap.val();
                    let html = '';
                    for(let id in users) {
                        if(users[id].email === OWNER_EMAIL) continue;
                        const isBlocked = users[id].status === 'blocked';
                        html += `
                        <div class="manage-game-item">
                            <div style="width:35px; height:35px; background:var(--glass); border-radius:50%; display:flex; justify-content:center; align-items:center;">👤</div>
                            <div>
                                <p style="font-size:14px;">${users[id].username}</p>
                                <p style="font-size:10px; color:${isBlocked?'red':'var(--success)'}">${users[id].status}</p>
                            </div>
                            <div class="manage-actions">
                                <button onclick="toggleBlock('${id}', '${users[id].status}')" style="background:${isBlocked?'var(--success)':'var(--danger)'}; border:none; color:white; padding:5px 10px; border-radius:5px; font-size:10px;">
                                    ${isBlocked ? 'UNBLOCK' : 'BLOCK'}
                                </button>
                            </div>
                        </div>`;
                    }
                    document.getElementById('admin-user-list').innerHTML = html;
                });
            }
        }

        window.pushGame = () => {
            const id = Date.now();
            const data = {
                id,
                icon: document.getElementById('g-icon').value,
                title: document.getElementById('g-title').value,
                video: document.getElementById('g-video').value,
                dl: document.getElementById('g-dl').value,
                desc: document.getElementById('g-desc').value
            };
            set(ref(db, 'games/' + id), data).then(() => {
                alert("Game Published!");
                document.querySelectorAll('#tab-admin input, #tab-admin textarea').forEach(i => i.value = '');
            });
        };

        window.deleteGame = (id) => {
            if(confirm("Delete this game?")) remove(ref(db, 'games/' + id));
        };

        window.saveSocials = () => {
            update(ref(db, 'settings/socials'), {
                whatsapp: document.getElementById('adm-wa-num').value,
                wa_channel: document.getElementById('adm-wa-chan').value,
                tiktok: document.getElementById('adm-tiktok').value,
                youtube: document.getElementById('adm-yt').value
            }).then(() => alert("Social Links Updated!"));
        };

        window.toggleBlock = (uid, status) => {
            update(ref(db, 'users/' + uid), { status: status === 'active' ? 'blocked' : 'active' });
        };

        window.updateProfile = () => {
            const name = document.getElementById('set-name').value;
            const pass = document.getElementById('set-pass').value;
            const conf = document.getElementById('set-conf-pass').value;

            if(pass && pass !== conf) return alert("Passwords don't match!");

            update(ref(db, 'users/' + auth.currentUser.uid), { name: name });
            
            if(pass) {
                updatePassword(auth.currentUser, pass).then(() => {
                    alert("Profile & Password Updated!");
                }).catch(err => alert(err.message));
            } else {
                alert("Profile Updated!");
            }
        };

        window.handleLogout = () => signOut(auth);
    </script>

    <script>
        // --- UI LOGIC ---
        function openSidebar() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('sidebar-overlay').classList.add('active');
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebar-overlay').classList.remove('active');
        }

        function switchAuth(mode) {
            document.getElementById('box-login').classList.toggle('hidden', mode === 'reg');
            document.getElementById('box-reg').classList.toggle('hidden', mode === 'log');
        }

        function showTab(tabId) {
            document.querySelectorAll('main section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            
            // Highlight active link
            const links = document.querySelectorAll('.nav-link');
            links.forEach(l => {
                if(l.innerText.toLowerCase().includes(tabId)) l.classList.add('active');
            });
            closeSidebar();
        }

        function togglePassView(id) {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling;
            if(input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function filterStore() {
            const q = document.getElementById('store-search').value.toLowerCase();
            const cards = document.querySelectorAll('#store-container .card');
            cards.forEach(c => {
                const title = c.querySelector('h3').innerText.toLowerCase();
                c.style.display = title.includes(q) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
